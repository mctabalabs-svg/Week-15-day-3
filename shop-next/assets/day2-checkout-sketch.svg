<svg width="600" height="400" xmlns="http://www.w3.org/2000/svg">
  <style>
    .state { fill: #e0e0e0; stroke: #333; stroke-width: 2; }
    .state-text { font-family: Arial, sans-serif; font-size: 14px; text-anchor: middle; dominant-baseline: middle; }
    .arrow { stroke: #333; stroke-width: 2; marker-end: url(#arrowhead); }
    .label { font-family: Arial, sans-serif; font-size: 12px; }
  </style>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333" />
    </marker>
  </defs>
  
  <!-- States as circles -->
  <circle cx="70" cy="60" r="40" class="state" />
  <text x="70" y="60" class="state-text">cart</text>
  
  <circle cx="180" cy="60" r="40" class="state" />
  <text x="180" y="60" class="state-text">info</text>
  
  <circle cx="290" cy="60" r="40" class="state" />
  <text x="290" y="60" class="state-text">payment</text>
  
  <circle cx="410" cy="60" r="40" class="state" />
  <text x="410" y="60" class="state-text">processing</text>
  
  <circle cx="520" cy="60" r="40" class="state" />
  <text x="520" y="60" class="state-text">confirmed</text>
  
  <circle cx="300" cy="200" r="40" class="state" fill="#ffcccc" />
  <text x="300" y="200" class="state-text">error</text>
  
  <!-- Arrows for forward transitions -->
  <line x1="110" y1="60" x2="140" y2="60" class="arrow" />
  <text x="125" y="50" class="label">NEXT</text>
  
  <line x1="220" y1="60" x2="250" y2="60" class="arrow" />
  <text x="235" y="50" class="label">NEXT</text>
  
  <line x1="330" y1="60" x2="370" y2="60" class="arrow" />
  <text x="350" y="50" class="label">NEXT</text>
  
  <!-- Arrows for backward transitions -->
  <line x1="180" y1="100" x2="180" y2="170" class="arrow" />
  <text x="195" y="135" class="label">BACK</text>
  
  <line x1="290" y1="100" x2="300" y2="160" class="arrow" />
  <text x="310" y="135" class="label">BACK</text>
  
  <!-- Error transitions -->
  <line x1="410" y1="100" x2="320" y2="160" class="arrow" stroke="#c00" />
  <text x="380" y="120" class="label" fill="#c00">ERROR</text>
  
  <line x1="180" y1="100" x2="290" y2="160" class="arrow" stroke="#c00" />
  <text x="220" y="120" class="label" fill="#c00">ERROR</text>
  
  <!-- Context data box -->
  <rect x="20" y="280" width="400" height="100" fill="#f5f5f5" stroke="#666" />
  <text x="40" y="300" class="label" font-weight="bold">Context Data:</text>
  <text x="40" y="320" class="label">• customer: { name, email, phone, address }</text>
  <text x="40" y="340" class="label">• paymentMethod: string | null</text>
  <text x="40" y="360" class="label">• orderId: string | null</text>
  <text x="40" y="380" class="label">• error: string | null</text>
</svg>